version: '3.8'

services:
  myelectricaldata:
    build: .
    image: myelectricaldata/local-client:latest
    container_name: myelectricaldata-client
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "9090:9090"  # Prometheus metrics
    environment:
      # Gateway credentials (required)
      - CLIENT_ID=${CLIENT_ID:-}
      - CLIENT_SECRET=${CLIENT_SECRET:-}
      - GATEWAY_URL=${GATEWAY_URL:-https://api.myelectricaldata.fr}

      # Database
      - DATABASE_URL=${DATABASE_URL:-sqlite+aiosqlite:///data/myelectricaldata.db}

      # Synchronization
      - SYNC_INTERVAL=${SYNC_INTERVAL:-3600}
      - SYNC_DAYS_BACK=${SYNC_DAYS_BACK:-7}

      # Integrations
      - HA_ENABLED=${HA_ENABLED:-true}
      - HA_DISCOVERY=${HA_DISCOVERY:-true}
      - MQTT_ENABLED=${MQTT_ENABLED:-false}
      - MQTT_HOST=${MQTT_HOST:-localhost}
      - MQTT_PORT=${MQTT_PORT:-1883}
      - METRICS_ENABLED=${METRICS_ENABLED:-false}

      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./data:/data
      - ./config:/config
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

